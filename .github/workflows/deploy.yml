name: Deploy to Azure

# Builds the backend & frontend container images, pushes them to GHCR,
# provisions Azure infrastructure with Bicep, and rolls out new revisions
# to Azure Container Apps.

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      environmentName:
        description: "Environment name (dev, staging, prod)"
        required: true
        default: "dev"
  # Automatic deploy on push to the main branch
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push images to GHCR
  id-token: write # request the OIDC token for passwordless Azure login

env:
  ENVIRONMENT_NAME: ${{ github.event.inputs.environmentName || 'dev' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-dm-packages-dev' }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      backendImage: ${{ steps.meta.outputs.backendImage }}
      frontendImage: ${{ steps.meta.outputs.frontendImage }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          TAG="${GITHUB_SHA::12}"
          echo "backendImage=${IMAGE_PREFIX}/backend:${TAG}" >> "$GITHUB_OUTPUT"
          echo "frontendImage=${IMAGE_PREFIX}/frontend:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backendImage }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            AZURE_MAPS_KEY=${{ secrets.AZURE_MAPS_KEY }}
          tags: |
            ${{ steps.meta.outputs.frontendImage }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Provision & Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create \
              --name "${{ env.RESOURCE_GROUP }}" \
              --location "${{ env.AZURE_LOCATION }}"

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >-
            environmentName=${{ env.ENVIRONMENT_NAME }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            backendImage=${{ needs.build-and-push.outputs.backendImage }}
            frontendImage=${{ needs.build-and-push.outputs.frontendImage }}
            registryServer=${{ env.REGISTRY }}
            registryUsername=${{ github.actor }}
            registryPassword=${{ secrets.GITHUB_TOKEN }}
          failOnStdErr: false

      - name: Run database migrations
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp exec \
              --name "dm-packages-${{ env.ENVIRONMENT_NAME }}-backend" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --command "alembic upgrade head"

      - name: Show deployed URLs
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Backend:  $(az deployment group show -g ${{ env.RESOURCE_GROUP }} -n main --query properties.outputs.backendUrl.value -o tsv)"
            echo "Frontend: $(az deployment group show -g ${{ env.RESOURCE_GROUP }} -n main --query properties.outputs.frontendUrl.value -o tsv)"
